<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connect Nest — Setup Wizard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&family=Baumans&display=swap">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent:      #15C7B4;
    --accent-dim:  #3c8b8c;
    --bg:          #3b4049;
    --bg2:         #383e47;
    --card-bg:     rgba(22, 25, 23, 0.95);
    --text:        #ffffff;
    --text-sec:    #BAC0C6;
    --text-dim:    #80828A;
    --border:      #5f7575;
    --radius:      16px;
    --error:       #e05c5c;
    --warn:        #d4a843;
  }

  body {
    font-family: 'Raleway', sans-serif;
    background: var(--bg) url('/cn-bg.jpg') center/cover no-repeat fixed;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 3rem;
  }

  /* ── Header ── */
  .cn-header { text-align: center; margin-bottom: 2rem; }
  .cn-header h1 { font-family: 'Baumans', sans-serif; font-size: 2rem; color: var(--accent); letter-spacing: 0.05em; }
  .cn-header p { color: var(--text-sec); font-size: 0.9rem; font-weight: 300; margin-top: 0.25rem; }

  /* ── Progress ── */
  .progress-track { width: 100%; max-width: 660px; margin-bottom: 1.5rem; }
  .progress-labels { display: flex; justify-content: space-between; font-size: 0.65rem; color: var(--text-dim); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .progress-bar-outer { height: 4px; background: var(--bg2); border-radius: 4px; overflow: hidden; }
  .progress-bar-inner { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s ease; }

  /* ── Card ── */
  .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; width: 100%; max-width: 660px; backdrop-filter: blur(20px); box-shadow: 0 4px 24px rgba(0,0,0,0.4); }

  /* ── Step header ── */
  .step-header { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1.5rem; }
  .step-icon { font-size: 2rem; line-height: 1; flex-shrink: 0; margin-top: 0.1rem; }
  .step-title { font-size: 1.3rem; font-weight: 700; }
  .step-subtitle { font-size: 0.85rem; color: var(--text-sec); margin-top: 0.2rem; font-weight: 300; }
  .step-badge { display: inline-block; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 0.15rem 0.5rem; border-radius: 8px; margin-left: 0.5rem; vertical-align: middle; }
  .badge-optional { background: rgba(212,168,67,0.2); color: var(--warn); }
  .badge-mandatory { background: rgba(21,199,180,0.15); color: var(--accent); }

  /* ── Form ── */
  .field { margin-bottom: 1.2rem; }
  label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--text-sec); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
  input[type=text], input[type=password], input[type=number], select {
    width: 100%; padding: 0.65rem 0.85rem; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'Raleway', sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.2s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  .field-row { display: flex; gap: 0.75rem; }
  .field-row .field { flex: 1; margin-bottom: 0; }
  .hint { font-size: 0.77rem; color: var(--text-dim); margin-top: 0.35rem; }

  /* ── Toggle rows ── */
  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 0.85rem 0; border-bottom: 1px solid rgba(95,117,117,0.3); gap: 1rem; }
  .toggle-row:last-child { border-bottom: none; }
  .toggle-info { flex: 1; }
  .toggle-name { font-weight: 600; font-size: 0.95rem; }
  .toggle-desc { font-size: 0.8rem; color: var(--text-sec); margin-top: 0.2rem; }
  .toggle-status { font-size: 0.72rem; padding: 0.25rem 0.6rem; border-radius: 12px; font-weight: 600; flex-shrink: 0; white-space: nowrap; }
  .status-pending  { background: rgba(95,117,117,0.3);   color: var(--text-dim); }
  .status-loading  { background: rgba(21,199,180,0.15);  color: var(--accent); }
  .status-done     { background: rgba(21,199,180,0.2);   color: var(--accent); }
  .status-error    { background: rgba(224,92,92,0.2);    color: var(--error); }
  .status-skip     { background: rgba(212,168,67,0.12);  color: var(--warn); }

  /* ── Checkbox toggle ── */
  .cn-checkbox { display: flex; align-items: center; gap: 0.6rem; cursor: pointer; user-select: none; }
  .cn-checkbox input[type=checkbox] { display: none; }
  .cn-checkbox .box {
    width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border);
    background: var(--bg2); display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .cn-checkbox input:checked + .box { background: var(--accent); border-color: var(--accent); }
  .cn-checkbox .box::after { content: '✓'; color: #0e1512; font-weight: 700; font-size: 0.8rem; opacity: 0; transition: opacity 0.15s; }
  .cn-checkbox input:checked + .box::after { opacity: 1; }
  .cn-checkbox .cx-label { font-size: 0.9rem; color: var(--text-sec); }

  /* ── Buttons ── */
  .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.7rem 1.4rem; border: none; border-radius: 8px; font-family: 'Raleway', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary   { background: var(--accent); color: #0e1512; }
  .btn-primary:hover:not(:disabled) { opacity: 0.88; }
  .btn-secondary { background: transparent; color: var(--text-sec); border: 1px solid var(--border); }
  .btn-secondary:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .btn-actions { display: flex; gap: 0.75rem; align-items: center; margin-top: 1.5rem; flex-wrap: wrap; }

  /* ── Preflight grid ── */
  .preflight-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
  @media (max-width: 520px) { .preflight-grid { grid-template-columns: 1fr; } }
  .preflight-col h3 { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-dim); margin-bottom: 0.9rem; }
  .preflight-item { display: flex; align-items: flex-start; gap: 0.6rem; padding: 0.45rem 0; border-bottom: 1px solid rgba(95,117,117,0.2); }
  .preflight-item:last-child { border-bottom: none; }
  .preflight-item .pi-icon { font-size: 1rem; flex-shrink: 0; margin-top: 0.05rem; }
  .preflight-item .pi-text { font-size: 0.85rem; color: var(--text-sec); line-height: 1.4; }
  .preflight-item .pi-text strong { color: var(--text); }
  .preflight-item .opt-tag { font-size: 0.62rem; color: var(--warn); background: rgba(212,168,67,0.15); padding: 0.1rem 0.35rem; border-radius: 4px; margin-left: 0.3rem; font-weight: 700; text-transform: uppercase; }
  .checklist-item { display: flex; align-items: flex-start; gap: 0.7rem; padding: 0.55rem 0; border-bottom: 1px solid rgba(95,117,117,0.2); cursor: pointer; }
  .checklist-item:last-child { border-bottom: none; }
  .check-box { width: 20px; height: 20px; border-radius: 5px; border: 2px solid var(--border); background: var(--bg2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; margin-top: 0.05rem; }
  .check-box.checked { background: var(--accent); border-color: var(--accent); }
  .check-box.checked::after { content: '✓'; color: #0e1512; font-size: 0.75rem; font-weight: 700; }
  .ci-text { font-size: 0.85rem; color: var(--text-sec); line-height: 1.4; }
  .ci-text strong { color: var(--text); }
  .ci-text .ci-hint { font-size: 0.75rem; color: var(--text-dim); margin-top: 0.2rem; }

  /* ── Alerts ── */
  .alert { border-radius: 8px; padding: 0.9rem 1rem; font-size: 0.87rem; margin-bottom: 1.25rem; line-height: 1.5; }
  .alert:last-child { margin-bottom: 0; }
  .alert-info    { background: rgba(21,199,180,0.1);  border: 1px solid rgba(21,199,180,0.3); color: #9ee8e0; }
  .alert-warn    { background: rgba(212,168,67,0.1);  border: 1px solid rgba(212,168,67,0.3); color: var(--warn); }
  .alert-error   { background: rgba(224,92,92,0.1);   border: 1px solid rgba(224,92,92,0.3);  color: var(--error); }
  .alert-success { background: rgba(21,199,180,0.1);  border: 1px solid rgba(21,199,180,0.4); color: #a7f0e8; }

  /* ── Spinner ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(21,199,180,0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }

  /* ── Restart ── */
  .restart-anim { text-align: center; padding: 2rem 0; }
  .restart-anim .big-spinner { width: 56px; height: 56px; border: 4px solid rgba(21,199,180,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
  .restart-anim p { color: var(--text-sec); }

  /* ── Done ── */
  .done-hero { text-align: center; padding: 0.5rem 0 1.5rem; }
  .done-hero .check { font-size: 3.5rem; margin-bottom: 0.75rem; }
  .done-hero h2 { font-family: 'Baumans', sans-serif; font-size: 1.8rem; color: var(--accent); }
  .done-hero p { color: var(--text-sec); margin-top: 0.4rem; font-weight: 300; font-size: 0.95rem; }
  .summary-list { list-style: none; margin: 1.25rem 0; }
  .summary-list li { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0; border-bottom: 1px solid rgba(95,117,117,0.2); font-size: 0.88rem; color: var(--text-sec); }
  .summary-list li:last-child { border-bottom: none; }
  .s-done { color: var(--accent); }
  .s-skip { color: var(--text-dim); }
  .s-label { flex: 1; }
  .s-note { font-size: 0.78rem; color: var(--text-dim); margin-left: auto; }

  /* ── After-wizard steps ── */
  .after-steps { margin-top: 0.5rem; }
  .after-steps li { font-size: 0.85rem; color: var(--text-sec); padding: 0.35rem 0; display: flex; align-items: flex-start; gap: 0.5rem; }
  .after-steps li::before { content: '→'; color: var(--accent); flex-shrink: 0; }

  /* ── Divider ── */
  .divider { border: none; border-top: 1px solid rgba(95,117,117,0.3); margin: 1.25rem 0; }

  /* ── Diagnostic box ── */
  .diag-box { font-size: 0.72rem; font-family: monospace; color: var(--text-dim);
    background: rgba(0,0,0,0.35); border-radius: 4px; padding: 0.35rem 0.65rem;
    margin-top: 0.6rem; overflow-x: auto; white-space: pre; }

  /* ── Fade in ── */
  .step-content { animation: fadeIn 0.22s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }

  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ── Landing step ── */
  .landing-options { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1.25rem 0; }
  @media (max-width: 520px) { .landing-options { grid-template-columns: 1fr; } }
  .option-card { border: 2px solid var(--border); border-radius: var(--radius); padding: 1.4rem 1.2rem;
    cursor: pointer; transition: border-color 0.2s, background 0.2s; text-align: center; }
  .option-card:hover { border-color: var(--accent); background: rgba(21,199,180,0.06); }
  .option-icon { font-size: 2rem; margin-bottom: 0.6rem; }
  .option-title { font-weight: 700; font-size: 1rem; margin-bottom: 0.35rem; }
  .option-desc { font-size: 0.8rem; color: var(--text-sec); line-height: 1.5; }
  .option-badge { display: inline-block; margin-top: 0.5rem; font-size: 0.62rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em; padding: 0.15rem 0.5rem; border-radius: 8px;
    background: rgba(21,199,180,0.15); color: var(--accent); }
  .upload-zone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 1.75rem;
    text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s;
    color: var(--text-sec); font-size: 0.88rem; margin-top: 1rem; }
  .upload-zone:hover { border-color: var(--accent); background: rgba(21,199,180,0.05); }
  .upload-zone .uz-icon { font-size: 2.2rem; margin-bottom: 0.5rem; }

  /* ── Review (config loaded) ── */
  .review-section { margin-bottom: 1.25rem; }
  .review-section-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.07em; color: var(--accent); margin-bottom: 0.65rem;
    padding-bottom: 0.3rem; border-bottom: 1px solid rgba(21,199,180,0.3); }
  .review-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.3rem 0; }
  .review-key { font-size: 0.82rem; color: var(--text-sec); min-width: 150px; flex-shrink: 0; }
  .review-val { flex: 1; padding: 0.4rem 0.65rem; background: rgba(22,25,23,0.6);
    border: 1px solid var(--border); border-radius: 6px; color: var(--text);
    font-family: 'Raleway', sans-serif; font-size: 0.88rem; outline: none; }
  .review-val:focus { border-color: var(--accent); }
  .review-toggle-row { display: flex; align-items: center; justify-content: space-between;
    padding: 0.45rem 0; border-bottom: 1px solid rgba(95,117,117,0.2); font-size: 0.88rem; }
  .review-toggle-row:last-child { border-bottom: none; }

  /* ── Summary step ── */
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  @media (max-width: 520px) { .summary-grid { grid-template-columns: 1fr; } }
  .summary-section { background: rgba(22,25,23,0.5); border: 1px solid var(--border);
    border-radius: 10px; padding: 1rem 1.1rem; }
  .summary-section-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.07em; color: var(--accent); margin-bottom: 0.7rem; }
  .summary-row { display: flex; justify-content: space-between; padding: 0.28rem 0;
    font-size: 0.84rem; border-bottom: 1px solid rgba(95,117,117,0.15); }
  .summary-row:last-child { border-bottom: none; }
  .summary-key { color: var(--text-sec); }
  .summary-val { color: var(--text); font-weight: 600; text-align: right; max-width: 55%; word-break: break-all; }
  .summary-section-full { grid-column: 1 / -1; }
</style>
</head>
<body>

<div class="cn-header">
  <h1>Connect Nest</h1>
  <p>Smart home setup wizard</p>
</div>

<div class="progress-track">
  <div class="progress-labels">
    <span id="prog-label">Step 1 of 10</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-bar-outer">
    <div class="progress-bar-inner" id="progress-bar" style="width:0%"></div>
  </div>
</div>

<div class="card">
  <div id="step-container"></div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const API = '/onboarding/api';
const STEPS = ['landing', 'welcome', 'preflight', 'addons', 'restart', 'mqtt', 'zigbee', 'tailscale', 'backup', 'onedrive', 'summary', 'done'];
let currentStep = 0;
let collected = {};   // form values & user choices
let landingState = 'choice';   // 'choice' | 'reviewing'

// ─── API helpers ──────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  let r;
  try {
    r = await fetch(API + path, opts);
  } catch(e) {
    throw new Error('Cannot reach wizard backend — check that the add-on started successfully');
  }
  const text = await r.text();
  try {
    return JSON.parse(text);
  } catch(e) {
    // Non-JSON response means nginx returned an error page (usually 502 = Python not running)
    const hint = r.status === 502
      ? 'Wizard backend is not running (502). Check the add-on log for Python errors.'
      : `Unexpected response (HTTP ${r.status}). Check add-on logs.`;
    throw new Error(hint);
  }
}
const get = (p) => api('GET', p);
const post = (p, b) => api('POST', p, b);

// ─── Progress ─────────────────────────────────────────────────────────────────
function _showProgress(v) {
  const el = document.querySelector('.progress-track');
  if (el) el.style.display = v ? '' : 'none';
}

function updateProgress() {
  if (STEPS[currentStep] === 'landing') { _showProgress(false); return; }
  _showProgress(true);
  // Exclude 'landing' from display count (it's step 0, not a numbered wizard step)
  const displayStep = currentStep;          // landing=0, welcome=1 → "Step 1"
  const total = STEPS.length - 2;          // exclude landing; done is the final step
  const pct = Math.round((currentStep / (STEPS.length - 1)) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-label').textContent = `Step ${displayStep} of ${total}`;
}

// ─── Navigation ───────────────────────────────────────────────────────────────
function goTo(step) {
  currentStep = STEPS.indexOf(step);
  updateProgress();
  render(step);
}
function next() {
  const nextStep = STEPS[currentStep + 1];
  // Skip restart if HACS was not opted in
  if (nextStep === 'restart' && !collected.install_hacs) {
    currentStep++;
    goTo(STEPS[currentStep + 1]);
    return;
  }
  goTo(nextStep);
}

// ─── Render dispatcher ────────────────────────────────────────────────────────
function render(step) {
  ({
    landing:   renderLanding,
    welcome:   renderWelcome,
    preflight: renderPreflight,
    addons:    renderAddons,
    restart:   renderRestart,
    mqtt:      renderMqtt,
    zigbee:    renderZigbee,
    tailscale: renderTailscale,
    backup:    renderBackup,
    onedrive:  renderOnedrive,
    summary:   renderSummary,
    done:      renderDone,
  }[step] || (() => {}))();
}

// ─── Shared helpers ───────────────────────────────────────────────────────────
function badge(id, state, label) {
  const el = document.getElementById(id);
  if (el) { el.className = `toggle-status status-${state}`; el.textContent = label; }
}

function checklistToggle(el) {
  const box = el.querySelector('.check-box');
  box.classList.toggle('checked');
}

// ═══════════════════════════════════════════════════════════════════════════════
// STEP 0 — Landing (choose: load config file OR start from scratch)
// ═══════════════════════════════════════════════════════════════════════════════
function renderLanding() {
  updateProgress();  // hides progress bar
  if (landingState === 'reviewing') { renderLandingReview(); return; }

  document.getElementById('step-container').innerHTML = `
    <div class="step-content">
      <div style="text-align:center;margin-bottom:1.5rem">
        <div style="font-family:'Baumans',sans-serif;font-size:1.7rem;color:var(--accent)">Connect Nest Setup</div>
        <div style="color:var(--text-sec);font-size:0.88rem;margin-top:0.3rem">How would you like to proceed?</div>
      </div>
      <div class="landing-options">
        <div class="option-card" onclick="showUploadZone()">
          <div class="option-icon">📂</div>
          <div class="option-title">Load Config File</div>
          <div class="option-desc">Load a pre-generated JSON config to pre-fill all wizard steps</div>
          <div class="option-badge">Recommended</div>
        </div>
        <div class="option-card" onclick="startScratch()">
          <div class="option-icon">🛠</div>
          <div class="option-title">Start from Scratch</div>
          <div class="option-desc">Step through the wizard and enter all details manually</div>
        </div>
      </div>
      <div id="upload-zone" style="display:none">
        <div class="upload-zone"
          onclick="document.getElementById('cfg-file-input').click()"
          ondragover="event.preventDefault();this.style.borderColor='var(--accent)'"
          ondragleave="this.style.borderColor=''"
          ondrop="handleFileDrop(event)">
          <div class="uz-icon">📄</div>
          <div>Drop <strong>CN Config JSON</strong> file here</div>
          <div style="font-size:0.78rem;color:var(--text-dim);margin-top:0.3rem">or click to browse</div>
        </div>
        <input type="file" id="cfg-file-input" accept=".json" style="display:none"
               onchange="handleFileInputChange(this)">
      </div>
    </div>`;
}

function showUploadZone() {
  const z = document.getElementById('upload-zone');
  if (z) z.style.display = '';
}

function startScratch() {
  _showProgress(true);
  collected._config_loaded = false;
  goTo('welcome');
}

function handleFileDrop(e) {
  e.preventDefault();
  e.currentTarget.style.borderColor = '';
  if (e.dataTransfer.files[0]) processConfigFile(e.dataTransfer.files[0]);
}

function handleFileInputChange(input) {
  if (input.files[0]) processConfigFile(input.files[0]);
}

function processConfigFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const cfg = JSON.parse(ev.target.result);
      applyConfig(cfg);
      landingState = 'reviewing';
      renderLanding();
    } catch(err) {
      alert('Could not parse config file.\n' + err.message);
    }
  };
  reader.readAsText(file);
}

function applyConfig(cfg) {
  if (cfg.network) {
    collected.hub_ip         = cfg.network.hub_static_ip  || '';
    collected.gateway        = cfg.network.gateway         || '';
    collected.subnet_mask    = cfg.network.subnet_mask     || '255.255.255.0';

async function checkHaStatus() {

  const actions = document.getElementById('welcome-actions');
  box.className = 'alert alert-info';
  box.textContent = 'Checking Home Assistant connection…';
  document.getElementById('start-btn').disabled = true;

  try {
    const s = await get('/status');
    if (s.ha_online) {
      box.className = 'alert alert-success';
      box.textContent = `✓ Home Assistant ${s.ha_version !== 'unknown' ? s.ha_version : ''} is running`.trim();
      document.getElementById('start-btn').disabled = false;
    } else {
      const diag = s._diag || {};
      box.className = 'alert alert-error';
      box.innerHTML = `✗ Cannot reach Home Assistant — make sure it is running
        <div class="diag-box">tcp=${diag.tcp} http=${diag.http} sup=${diag.sup} ver=${diag.ver} token=${diag.token}</div>`;
      actions.innerHTML = `
        <button class="btn btn-primary" onclick="checkHaStatus()">↺ Retry check</button>
        <button class="btn btn-secondary" onclick="next()" title="Supervisor API calls may fail if HA is not running">Proceed anyway →</button>`;
    }
  } catch(e) {
    box.className = 'alert alert-error';
    box.textContent = 'Connection error: ' + e.message;
    actions.innerHTML = `<button class="btn btn-primary" onclick="checkHaStatus()">↺ Retry check</button>`;
  }
}

      </p>
      <div id="restart-area">
        <div class="btn-actions">
          <button class="btn btn-primary" onclick="doRestart()">Restart HA Now →</button>
          <button class="btn btn-secondary" onclick="next()">Skip (already restarted)</button>
        </div>
      </div>
    </div>`;

async function doRestart() {
  const area = document.getElementById('restart-area');
  area.innerHTML = `
    <div class="restart-anim">
      <div class="big-spinner"></div>
      <p id="restart-msg">Triggering Home Assistant restart…</p>
      <p id="restart-hint" style="font-size:0.8rem;color:var(--text-dim);margin-top:0.5rem">This can take 30–90 seconds. Do not close this tab.</p>
      <p id="restart-elapsed" style="font-size:0.75rem;color:var(--text-dim);margin-top:0.35rem"></p>
    </div>`;

  // Step 1: fire-and-forget trigger (backend returns immediately now)
  try {
    const r = await post('/step/restart', {});
    if (!r.ok) {
      area.innerHTML = `
        <div class="alert alert-error">Could not trigger restart: ${r.message || 'unknown error'}</div>
        <div class="btn-actions">
          <button class="btn btn-primary" onclick="doRestart()">Retry</button>
          <button class="btn btn-secondary" onclick="next()">Skip</button>
        </div>`;
      return;
    }
  } catch(e) {
    // Backend may already be restarting — swallow and poll anyway
    console.warn('Restart trigger request failed (expected if backend already down):', e);
  }

  // Step 2: poll /api/status until HA + wizard backend are both reachable again
  document.getElementById('restart-msg').textContent = 'Waiting for Home Assistant to come back online…';
  const startedAt = Date.now();
  const MAX_MS    = 10 * 60 * 1000; // 10 min
  const INTERVAL  = 5000;           // 5 s

  async function pollOnce() {
    try {
      const res = await fetch('/onboarding/api/status', { cache: 'no-store' });
      if (!res.ok) return false;
      const data = await res.json();
      return !!data.ha_online;
    } catch(_) {
      return false; // addon backend still down or network glitch
    }
  }

  // Initial short delay to let HA begin shutting down before we start polling
  await new Promise(r => setTimeout(r, 8000));

  while (Date.now() - startedAt < MAX_MS) {
    const elapsedSec = Math.floor((Date.now() - startedAt) / 1000);
    const el = document.getElementById('restart-elapsed');
    if (el) el.textContent = `Elapsed: ${elapsedSec}s`;
    if (await pollOnce()) {
      area.innerHTML = '<div class="alert alert-success">✓ Home Assistant is back online</div>';
      setTimeout(next, 1200);
      return;
    }
    await new Promise(r => setTimeout(r, INTERVAL));
  }

  // Timed out after 10 min
  area.innerHTML = `
    <div class="alert alert-warn">⚠️ HA did not come back online within 10 minutes. Check the HA Add-ons page manually, then continue.</div>
    <div class="btn-actions">
      <button class="btn btn-primary" onclick="doRestart()">Retry</button>
      <button class="btn btn-secondary" onclick="next()">Continue anyway →</button>
    </div>`;
}

          <input type="number" id="z2m-port" value="${collected.z2m_port || 6638}" min="1" max="65535">
          <p class="hint">Default: 6638</p>
        </div>
        <div class="field">
          <label>Adapter Type</label>
          <select id="z2m-adapter">
            <option value="zstack" ${(collected.z2m_adapter||'zstack')==='zstack'?'selected':''}>ZStack (SLZB-06 default)</option>
            <option value="ember"  ${(collected.z2m_adapter||'')==='ember'?'selected':''}>Ember / EZSP</option>
            <option value="deconz" ${(collected.z2m_adapter||'')==='deconz'?'selected':''}>deCONZ (ConBee)</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>MQTT Password</label>
        <input type="password" id="z2m-pass" value="${collected.mqtt_password || ''}" placeholder="Same password as MQTT step">
        <p class="hint">Must match the password you set in the MQTT step</p>
      </div>
      <div class="alert alert-info">
        ℹ️ Start order is enforced: Mosquitto runs first, then Zigbee2MQTT connects to it.
      </div>
      <div class="btn-actions">
        <button class="btn btn-primary" id="z2m-btn" onclick="doZigbee()">Install & Configure →</button>
      </div>
    </div>`;
}

async function doZigbee() {
  const ip = document.getElementById('z2m-ip').value.trim();
  const port = parseInt(document.getElementById('z2m-port').value);
  const adapter = document.getElementById('z2m-adapter').value;
  const pass = document.getElementById('z2m-pass').value;
  const msg = document.getElementById('z2m-msg');
  const btn = document.getElementById('z2m-btn');
  if (!ip) { showMsg(msg, 'error', 'Coordinator IP is required'); return; }
  if (!pass) { showMsg(msg, 'error', 'MQTT password is required'); return; }
  collected.z2m_ip = ip; collected.z2m_port = port; collected.z2m_adapter = adapter;
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Installing Zigbee2MQTT…';
  try {
    const r = await post('/step/zigbee', {
      coordinator_ip: ip, coordinator_port: port, adapter: adapter,
      mqtt_username: collected.mqtt_username || 'cn_mqtt', mqtt_password: pass,
    });
    if (r.ok) {
      showMsg(msg, 'success', '✓ ' + r.message); btn.textContent = 'Done'; setTimeout(next, 1500);
    } else {
      showMsg(msg, 'error', r.error || 'Failed'); btn.disabled = false; btn.textContent = 'Retry';
    }
  } catch(e) {
    showMsg(msg, 'error', e.message); btn.disabled = false; btn.textContent = 'Retry';
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// STEP 7 — Tailscale (optional)
// ═══════════════════════════════════════════════════════════════════════════════
function renderTailscale() {
  document.getElementById('step-container').innerHTML = `
    <div class="step-content">
      <div class="step-header">
        <div class="step-icon">🔒</div>
        <div>
          <div class="step-title">Tailscale VPN <span class="step-badge badge-optional">Optional</span></div>
          <div class="step-subtitle">Secure remote access to your home — no port forwarding needed</div>
        </div>
      </div>
      <div id="ts-msg" style="display:none"></div>
      <p style="color:var(--text-sec);font-size:0.9rem;line-height:1.65;margin-bottom:1.25rem">
        Tailscale lets you access your Home Assistant from anywhere using a private, encrypted
        tunnel. After installation you'll click an authentication link in the add-on log to
        link your Tailscale account.
      </p>
      <div class="alert alert-info">
        Get a reusable auth key at <a href="https://login.tailscale.com/admin/settings/keys" target="_blank">tailscale.com → Settings → Keys</a>
        before proceeding. One-time keys expire immediately after use.
      </div>
      <div class="btn-actions" style="margin-top:1.25rem">
        <button class="btn btn-primary" id="ts-btn" onclick="doTailscale()">Install Tailscale</button>
        <button class="btn btn-secondary" onclick="next()">Skip this step</button>
      </div>
    </div>`;
}

async function doTailscale() {
  const msg = document.getElementById('ts-msg');
  const btn = document.getElementById('ts-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Installing…';
  try {
    const r = await post('/step/tailscale', {});
    if (r.ok) {
      showMsg(msg, 'success', `✓ ${r.message}`);
      if (r.instructions) {
        const n = document.createElement('div'); n.className = 'alert alert-warn'; n.style.marginTop = '0.75rem';
        n.innerHTML = `<strong>Action required:</strong> ${r.instructions}`; msg.after(n);
      }
      btn.textContent = 'Continue →'; btn.onclick = next; btn.disabled = false;
    } else {
      showMsg(msg, 'error', r.error || 'Failed'); btn.disabled = false; btn.textContent = 'Retry';
    }
  } catch(e) {
    showMsg(msg, 'error', e.message); btn.disabled = false; btn.textContent = 'Retry';
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// STEP 8 — Backup (mandatory)
// ═══════════════════════════════════════════════════════════════════════════════
function renderBackup() {
  document.getElementById('step-container').innerHTML = `
    <div class="step-content">
      <div class="step-header">
        <div class="step-icon">💾</div>
        <div>
          <div class="step-title">Automatic Backups <span class="step-badge badge-mandatory">Required</span></div>
          <div class="step-subtitle">Configure HA's built-in backup schedule</div>
        </div>
      </div>
      <div id="bk-msg" style="display:none"></div>
      <div class="field">
        <label>Schedule</label>
        <select id="bk-schedule">
          <option value="daily">Daily</option>
          <option value="weekly" selected>Weekly</option>
          <option value="monthly">Monthly</option>
        </select>
      </div>
      <div class="field">
        <label>Copies to keep</label>
        <input type="number" id="bk-copies" value="3" min="1" max="30">
        <p class="hint">Older backups are automatically removed</p>
      </div>
      <div class="btn-actions">
        <button class="btn btn-primary" id="bk-btn" onclick="doBackup()">Configure →</button>
        <button class="btn btn-secondary" onclick="next()">Configure later</button>
      </div>
    </div>`;
}

async function doBackup() {
  const schedule = document.getElementById('bk-schedule').value;
  const copies = parseInt(document.getElementById('bk-copies').value);
  const msg = document.getElementById('bk-msg');
  const btn = document.getElementById('bk-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Saving…';
  try {
    const r = await post('/step/backup', { schedule, copies });
    if (r.ok) {
      showMsg(msg, 'success', '✓ ' + r.message); btn.textContent = 'Done'; setTimeout(next, 1200);
    } else {
      showMsg(msg, 'error', r.error || 'Failed'); btn.disabled = false; btn.textContent = 'Retry';
    }
  } catch(e) {
    showMsg(msg, 'error', e.message); btn.disabled = false; btn.textContent = 'Retry';
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// STEP 9 — OneDrive Backup (optional)
// ═══════════════════════════════════════════════════════════════════════════════
function renderOnedrive() {
  const hacsInstalled = collected.install_hacs !== false;
  document.getElementById('step-container').innerHTML = `
    <div class="step-content">
      <div class="step-header">
        <div class="step-icon">☁️</div>
        <div>
          <div class="step-title">OneDrive Backup <span class="step-badge badge-optional">Optional</span></div>
          <div class="step-subtitle">Automatically sync HA backups to Microsoft OneDrive</div>
        </div>
      </div>
      <div id="od-msg" style="display:none"></div>
      <p style="color:var(--text-sec);font-size:0.9rem;line-height:1.65;margin-bottom:1.25rem">
        The OneDrive Backup integration stores your HA backups in the cloud automatically.
        It's installed via HACS and requires signing in to your Microsoft account.
      </p>
      ${!hacsInstalled ? `
      <div class="alert alert-warn" style="margin-bottom:1.25rem">
        ⚠️ HACS was not installed in this wizard run. OneDrive Backup requires HACS.
        You can install HACS later and then add OneDrive Backup from the HACS integrations store.
      </div>` : `
      <div class="alert alert-info" style="margin-bottom:1.25rem">
        ℹ️ This step cannot be fully automated — OneDrive Backup requires a Microsoft sign-in.
        The wizard will mark this as a follow-up task.
      </div>
      <div class="alert alert-warn">
        <strong>After setup, install manually:</strong>
        <ul class="after-steps" style="margin-top:0.5rem">
          <li>Open HACS → Integrations → Search "OneDrive Backup"</li>
          <li>Install → Restart HA</li>
          <li>Settings → Integrations → OneDrive Backup → Configure → Sign in to Microsoft</li>

      </div>`}
      <div class="btn-actions" style="margin-top:1.25rem">
        ${hacsInstalled ? `<button class="btn btn-primary" id="od-btn" onclick="doOnedrive()">Mark as follow-up</button>` : ''}

async function doOnedrive() {
  const msg = document.getElementById('od-msg');
  const btn = document.getElementById('od-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  try {
    const r = await post('/step/onedrive', {});
    showMsg(msg, 'success', '✓ OneDrive Backup marked as a follow-up task');
    btn.textContent = 'Done'; setTimeout(next, 1200);
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Mark as follow-up'; next();
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// STEP 11 — Summary (both Option A and B funnel here before Done)
// ═══════════════════════════════════════════════════════════════════════════════
function renderSummary() {
  const c = collected;
  const hubIP = c.hub_ip || window.location.hostname;

  const netRows    = [['Hub IP', hubIP], ['Gateway', c.gateway||'—'], ['Location', c.location_city||'—']];
  const zigRows    = [['Coordinator IP', c.z2m_ip||'—'], ['TCP Port', c.z2m_port||6638], ['Adapter', c.z2m_adapter||'ember']];
  const mqttRows   = [['Username', c.mqtt_username||'cn_mqtt'], ['Password', '••••••••']];
  const optRows    = [
    ['Studio Code',  c.install_studio_code!==false ? '✓ Yes' : '✗ No'],
    ['HACS',         c.install_hacs!==false         ? '✓ Yes' : '✗ No'],
    ['Tailscale',    c.tailscale_done                ? '✓ Installed' : '— Skipped'],
    ['OneDrive',     c.install_onedrive              ? '✓ Yes' : '— No'],
    ['Backup',       (c.backup_schedule||'daily') + ' · keep ' + (c.backup_copies||3)],
  ];

  function sectionHTML(title, rows, full) {
    return `<div class="summary-section${full?' summary-section-full':''}">
      <div class="summary-section-title">${title}</div>
      ${rows.map(([k,v])=>`<div class="summary-row"><span class="summary-key">${k}</span><span class="summary-val">${v}</span></div>`).join('')}
    </div>`;
  }

  document.getElementById('step-container').innerHTML = `
    <div class="step-content">
      <div class="step-header">
        <div class="step-icon">📋</div>
        <div>
          <div class="step-title">Installation Summary</div>
          <div class="step-subtitle">${c.customer_name||'Review all values before completing'}</div>
        </div>
      </div>
      <div class="summary-grid">
        ${sectionHTML('🌐 Network', netRows)}
        ${sectionHTML('📡 MQTT Broker', mqttRows)}
        ${sectionHTML('🔌 Zigbee Coordinator', zigRows)}
        ${sectionHTML('🧩 Install Options', optRows)}
      </div>
      <div class="btn-actions" style="margin-top:1.25rem">
        <button class="btn btn-secondary" onclick="exportSummaryJSON()">⬇ Export Config JSON</button>
        <button class="btn btn-secondary" onclick="goTo('landing')">← Modify / Restart</button>
        <button class="btn btn-primary" onclick="completeSummary()">Confirm & Complete →</button>
      </div>
    </div>`;
}

function exportSummaryJSON() {
  const c = collected;
  const cfg = {
    _meta: {
      version: '1.0',
      exported_at: new Date().toISOString(),
      customer_name: c.customer_name || '',
      install_date:  c.install_date  || new Date().toLocaleDateString('en-AU'),
      site_address:  c.site_address  || '',
    },
    network: {
      hub_static_ip:  c.hub_ip          || window.location.hostname,
      gateway:        c.gateway         || '',
      location_city:  c.location_city   || '',
    },
    zigbee: {
      coordinator_ip:   c.z2m_ip       || '',
      coordinator_port: c.z2m_port      || 6638,
      adapter:          c.z2m_adapter   || 'ember',
    },
    mqtt: {
      username: c.mqtt_username || 'cn_mqtt',
      password: c.mqtt_password || '',
    },
    options: {
      install_studio_code: c.install_studio_code !== false,
      install_hacs:        c.install_hacs        !== false,
      install_tailscale:   !!c.tailscale_done,
      install_onedrive:    !!c.install_onedrive,
      backup_schedule:     c.backup_schedule     || 'daily',
      backup_copies:       c.backup_copies       || 3,
    },
  };
  const name = (c.customer_name || 'cn').replace(/\s+/g, '_');
  const date = new Date().toISOString().slice(0, 10);
  const blob = new Blob([JSON.stringify(cfg, null, 2)], { type: 'application/json' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `CN_Install_${name}_${date}.json`;
  a.click();
}

async function completeSummary() {
  await post('/step/complete', {}).catch(() => {});
  goTo('done');
}

// ═══════════════════════════════════════════════════════════════════════════════
// STEP 12 — Done
// ═══════════════════════════════════════════════════════════════════════════════
async function renderDone() {
  // step/complete was already called by completeSummary() — call again is harmless
  let state = {};
  try { const r = await get('/status'); state = r.wizard_state || {}; } catch(e) {}

  const followUps = [];
  if (state.hacs_files) followUps.push('HACS: complete GitHub authorisation — HA → Settings → Integrations → HACS');
  if (state.tailscale)  followUps.push('Tailscale: open the add-on log, click the authentication URL to link your account');
  if (state.mqtt)       followUps.push('MQTT: accept the integration notification that appeared in HA');
  if (state.onedrive)   followUps.push('OneDrive: install via HACS → Integrations → "OneDrive Backup" → sign in');

  document.getElementById('step-container').innerHTML = `
    <div class="step-content">
      <div class="done-hero">
        <div class="check">🎉</div>
        <h2>Setup Complete!</h2>
        <p>Your Connect Nest smart home is ready</p>
      </div>
      ${followUps.length ? `
      <div class="alert alert-warn">
        <strong>Action required — complete these manually:</strong>
        <ul class="after-steps" style="margin-top:0.5rem">
          ${followUps.map(f => `<li>${f}</li>`).join('')}
        </ul>
      </div>` : '<div class="alert alert-success">✓ All steps completed — no manual actions required</div>'}
      <div class="alert alert-info" style="margin-top:1rem">
        ℹ️ Apply the CN dark theme: HA → Profile → Theme → select <strong>cn_dark</strong> → Save
      </div>
      <div class="btn-actions" style="margin-top:1.5rem">
        <button class="btn btn-primary" onclick="openHaMain()">Open Home Assistant →</button>
      </div>
    </div>`;
  updateProgress();
}

// ─── Utility ──────────────────────────────────────────────────────────────────
function openHaMain() {
  // Strip :7080 (direct wizard access) and redirect to HA Core on :8123.
  // If the wizard was opened via HA sidebar ingress, just go to site root.
  const host = window.location.hostname;
  const viaIngress = window.location.port === '' || window.location.port === '8123';
  window.location.href = viaIngress ? '/' : `http://${host}:8123/`;
}

function showMsg(el, type, text) {
  el.className = `alert alert-${type}`;
  el.textContent = text;
  el.style.display = '';
  el.style.marginBottom = '1rem';
}

// ─── Bootstrap ────────────────────────────────────────────────────────────────
// Check for ?config= URL param (pre-filled from cn-preconfig-form)
(function() {
  try {
    const cfg64 = new URLSearchParams(window.location.search).get('config');
    if (cfg64) {
      const cfg = JSON.parse(decodeURIComponent(escape(atob(cfg64))));
      applyConfig(cfg);
      landingState = 'reviewing';
    }
  } catch(e) { console.warn('Invalid ?config param:', e); }
})();
updateProgress();
render(STEPS[0]);
</script>
