<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Konnect Nest — Connecting...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #2c443c;
      color: #cddada;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 24px;
    }
    .logo-wrap {
      width: 80px;
      height: 80px;
      animation: pulse 2s ease-in-out infinite;
    }
    .logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #15c7b4;
      letter-spacing: 0.05em;
    }
    p {
      font-size: 0.95rem;
      opacity: 0.7;
      text-align: center;
      max-width: 300px;
      line-height: 1.6;
    }
    .dot-loader {
      display: flex;
      gap: 8px;
    }
    .dot-loader span {
      width: 10px;
      height: 10px;
      background: #15c7b4;
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dot-loader span:nth-child(2) { animation-delay: 0.2s; }
    .dot-loader span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.7; transform: scale(0.95); }
    }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-12px); }
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <img src="/static/icons/kn-icon-192.png" alt="Konnect Nest">
  </div>
  <h1>Konnect Nest</h1>
  <div class="dot-loader">
    <span></span><span></span><span></span>
  </div>
  <p>Your smart home is starting up.<br>This usually takes less than a minute.</p>
  <script>
    // Auto-reload once HA is back
    setTimeout(() => location.reload(), 8000);
  </script>
</body>
</html>
